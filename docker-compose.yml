services:
  bot:
    # The web app container. Named "bot" for consistency with other
    # deployments; it is an HTTP web server, not a chat bot.
    build: .
    image: inbox-emailcf:latest
    container_name: inbox-emailcf
    restart: unless-stopped
    # Reads secrets & branding from .env (edit on the VPS with `nano .env`).
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000

  caddy:
    # Optional reverse proxy with automatic HTTPS (Let's Encrypt).
    # Only runs when explicitly enabled:  docker compose --profile proxy up -d
    # Set WEB_DOMAIN in .env first (and point its DNS A record to this VPS).
    image: caddy:2-alpine
    container_name: inbox-caddy
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - bot
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
